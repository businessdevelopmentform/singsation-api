# Server
server.address=0.0.0.0
server.port=8081

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/singsationdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=499300CentoroE#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - FIXED with longer key (64+ characters)
jwt.secret=mySecretKeyForJWTGeneration2026SingsationAppThatIsNowLongEnoughForHS512AlgorithmSecureKey
jwt.expiration=86400000

# CORS - FIXED for production with allowedOriginPatterns
cors.allowed-origins=http://localhost:3000,http://10.0.2.2,http://localhost

# Optional: SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Optional: Remove the default security password warning
spring.security.user.name=admin
spring.security.user.password=admin

# ========== YOCO PAYMENT CONFIGURATION ==========
# Yoco API Keys (get these from your Yoco dashboard)
yoco.secret.key=your_yoco_secret_key_here
yoco.public.key=your_yoco_public_key_here
yoco.api.url=https://online.yoco.com/v1

# Yoco Webhook Secret (for verifying webhook signatures)
yoco.webhook.secret=your_webhook_secret_here

# Payment Settings
